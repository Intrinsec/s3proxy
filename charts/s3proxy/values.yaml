replicaCount: 1

image:
  repository: ghcr.io/intrinsec/s3proxy
  pullPolicy: Always
  # tag: latest

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Can add "--no-tls" if you don't want TLS
# By default, listenning TLS with files /etc/s3proxy/certs/s3proxy.crt & /etc/s3proxy/certs/s3proxy.key
args: ["--level=-4"]

cert: # From CertManager CRD
  enable: false
  issuerRefKind: ClusterIssuer
  # issuerRefName: internal-company-com
  # commonName: "*.s3proxy.internal.company.com"

config:
  host: s3.us-east-1.amazonaws.com
  # throttling: 5
  # accessKey: CHANGEME
  # secretKey: CHANGEME
  # encryptKey: CHANGEME
  # OpenTelemetry OTLP/HTTP tracing. Leave unset to disable trace export.
  # otlpEndpoint: https://otel-collector.observability.svc.cluster.local:4318
  # otlpTracesEndpoint: https://otel-collector.observability.svc.cluster.local:4318/v1/traces
  # otlpHeaders: "authorization=Bearer CHANGEME"

# Extra environment variables appended to the container env.
extraEnv: []
# - name: SOMETHING
#   value: "value"
valsSecret: {}
#   accessKey: ref+vault://s3proxy/secrets/access-key
#   secretKey: ref+vault://s3proxy/secrets/secret-key
#   encryptKey: ref+vault://s3proxy/secrets/encrypt-key

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 4433

ingress:
  enabled: false

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 250m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /healthz  # Liveness endpoint
    port: 4433
    scheme: HTTPS
readinessProbe:
  httpGet:
    path: /readyz  # Readiness endpoint
    port: 4433
    scheme: HTTPS

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 70

# ServiceMonitor for the Prometheus Operator. Requires the
# monitoring.coreos.com/v1 CRD to be installed in the cluster.
serviceMonitor:
  enabled: false
  # namespace: monitoring
  interval: 30s
  scrapeTimeout: 10s
  path: /metrics
  # scheme: https  # flip to http when running with --no-tls
  labels: {}
  # tlsConfig is needed when metrics are served over the same TLS as S3 traffic.
  tlsConfig:
    insecureSkipVerify: true
  relabelings: []
  metricRelabelings: []

# PrometheusRule bundles the s3proxy alert rules (HighErrorRate, HighLatency,
# ServiceDown, HighCrashRate). Requires the monitoring.coreos.com/v1 CRD.
prometheusRule:
  enabled: false
  # namespace: monitoring
  labels: {}
  thresholds:
    highErrorRate: 0.05
    highLatencySeconds: 2
    crashes: 0
  for:
    highErrorRate: 10m
    highLatency: 10m
    serviceDown: 2m
    highCrashRate: 5m

# Grafana dashboard ConfigMap. When enabled the chart ships a ConfigMap
# carrying the s3proxy dashboard JSON, labeled so the grafana-operator /
# dashboard sidecar picks it up automatically.
grafanaDashboard:
  enabled: false
  # namespace: monitoring
  label: grafana_dashboard
  labels: {}
  annotations: {}

# Additional volumes on the output Deployment definition.
extraVolumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
extraVolumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}
