groups:
  - name: s3proxy
    rules:
      - alert: S3ProxyHighErrorRate
        expr: |
          sum(rate(http_requests_total{service="s3proxy",status=~"5.."}[5m]))
            /
          sum(rate(http_requests_total{service="s3proxy"}[5m]))
            > 0.05
        for: 10m
        labels:
          severity: critical
          service: s3proxy
        annotations:
          summary: "s3proxy error rate above 5% over 5m"
          description: |
            More than 5% of HTTP responses from s3proxy have a 5xx status code
            over the last 5 minutes. Check upstream S3 reachability, the
            /readyz probe, and s3proxy_upstream_errors_total.

      - alert: S3ProxyHighLatency
        expr: |
          histogram_quantile(0.95,
            sum by (le) (rate(http_request_duration_seconds_bucket{service="s3proxy"}[5m]))
          ) > 2
        for: 10m
        labels:
          severity: warning
          service: s3proxy
        annotations:
          summary: "s3proxy p95 latency above 2s"
          description: |
            The 95th-percentile HTTP latency on s3proxy has been above 2 seconds
            for 10 minutes. Inspect encrypt/decrypt duration histograms and
            upstream S3 latency.

      - alert: S3ProxyServiceDown
        expr: up{job="s3proxy"} == 0
        for: 2m
        labels:
          severity: critical
          service: s3proxy
        annotations:
          summary: "s3proxy instance down"
          description: |
            Prometheus cannot scrape {{ $labels.instance }}. Either the process
            is down or /metrics is unreachable.

      - alert: S3ProxyHighCrashRate
        expr: |
          increase(service_crashes_total{service="s3proxy"}[5m]) > 0
        for: 5m
        labels:
          severity: critical
          service: s3proxy
        annotations:
          summary: "s3proxy recovered from one or more handler panics"
          description: |
            service_crashes_total has increased in the last 5 minutes, meaning
            the HTTP middleware recovered from at least one panic. Inspect
            recent logs for stack traces and root-cause the failure.
